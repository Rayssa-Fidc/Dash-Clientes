<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard FIDC — LFS Financial Advisory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --or:#E8621A;--or2:#f07540;--or-dim:rgba(232,98,26,.1);
  --nav:#1C1814;--tx:#2a2218;--mu:#7a6e5f;--bd:rgba(0,0,0,.08);
  --wh:#fff;--bg:#F4F1EC;
  --gn:#1E6B43;--gn-dim:rgba(30,107,67,.1);
  --rd:#c0392b;--rd-dim:rgba(192,57,43,.1);
  --go:#C9962A;--go-dim:rgba(201,150,42,.12);
  --bl:#1a5276;--bl-dim:rgba(26,82,118,.1);
  --ye:#b7950b;--ye-dim:rgba(183,149,11,.12);
  --sh:0 4px 24px rgba(0,0,0,.08);--sh2:0 16px 48px rgba(0,0,0,.16);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;}

/* HEADER */
.header{background:var(--nav);padding:13px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-sq{width:40px;height:40px;background:var(--or);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:13px;}
.brand-name{font-family:'Syne',sans-serif;color:#fff;font-size:16px;font-weight:700;}
.brand-sub{color:rgba(255,255,255,.4);font-size:11px;}
.hright{display:flex;align-items:center;gap:9px;}
.auth-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:8px;padding:6px 12px;}
.auth-av{width:26px;height:26px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.hbtn{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;}
.hbtn.accent{background:var(--or);color:#fff;}

/* TABS */
.tabs{background:var(--wh);border-bottom:2px solid var(--bd);padding:0 32px;display:flex;}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .16s;}
.tab.active{color:var(--or);border-bottom-color:var(--or);font-weight:600;}

/* PAGE */
.page{display:none;padding:24px 32px;}
.page.active{display:block;}

/* BLOCK */
.block{background:var(--wh);border-radius:12px;border:1px solid var(--bd);overflow:hidden;margin-bottom:22px;box-shadow:var(--sh);}
.bhead{padding:12px 18px;background:var(--nav);display:flex;align-items:center;justify-content:space-between;}
.btitle{color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;}

/* TABLE */
table.dt{width:100%;border-collapse:collapse;}
table.dt thead tr{background:rgba(0,0,0,.03);}
table.dt thead th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;border-bottom:1px solid var(--bd);}
table.dt tbody td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--bd);}

/* IMPRESSÃO ABA GERENTE */
.print-toolbar { display: flex; justify-content: flex-end; margin-bottom: 20px; }

@media print {
    .header, .fbar, .tabs, .toolbar, .no-print, .hright, .tbtn, .mabtn, #syncBtn, footer, .print-toolbar, .hbtn {
        display: none !important;
    }
    .page { display: block !important; padding: 0 !important; }
    .block { box-shadow: none !important; border: 1px solid #ddd !important; page-break-inside: avoid; }
    body { background: #fff !important; }
}

/* BADGES & ALERTA */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.alerta{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;}
.alerta .dot{width:8px;height:8px;border-radius:50%;}
.al-ativo .dot{background:var(--gn);}
.al-and .dot{background:var(--or);}

/* LOGIN OVERLAY */
#loginOverlay{position:fixed;inset:0;z-index:9999;display:flex;background:var(--nav);align-items:center;justify-content:center;}
.lo-box{background:#fff;border-radius:20px;max-width:380px;width:calc(100% - 40px);padding:40px;text-align:center;}
.lo-btn{width:100%;padding:14px;background:var(--or);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="lo-box">
    <div style="font-weight:700; margin-bottom:10px;">LFS Financial Advisory</div>
    <div style="margin-bottom:20px;">Dashboard Controle FIDC</div>
    <button class="lo-btn" onclick="doLoginFromOverlay()">Entrar com Microsoft</button>
  </div>
</div>

<div class="header">
  <div class="brand">
    <div class="brand-sq">LFS</div>
    <div class="brand-name">Controle Operacional — FIDC</div>
  </div>
  <div class="hright">
    <button class="hbtn" id="syncBtn" onclick="syncData()">↻ Sincronizar</button>
    <div class="auth-pill" id="authPill" style="display:none">
      <div class="auth-av" id="authAv">?</div>
      <span class="auth-nm" id="authNm"></span>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('visao')">📊 Visão Geral</div>
  <div class="tab" onclick="showTab('gerente')">👤 Por Gerente</div>
</div>

<div class="page active" id="tab-visao">
    <div id="offB" style="padding:10px; background:#fff3cd; margin-bottom:10px; border-radius:8px;">⚠️ Faça login para sincronizar dados.</div>
    <div class="block">
        <div class="bhead"><span class="btitle">Resumo de Metas</span></div>
        <table class="dt"><thead id="metasTH"></thead><tbody id="metasTB"></tbody></table>
    </div>
</div>

<div class="page" id="tab-gerente">
    <div class="print-toolbar">
        <button style="padding:8px 16px; border-radius:8px; cursor:pointer;" onclick="window.print()">🖨️ Imprimir Relatório</button>
    </div>
    <div id="geC"></div>
</div>

<script>
// CONFIGURAÇÕES REAIS (FILE_ID, CLIENT_ID, etc)
const CFG = { clientId: '67061d6c-ac2c-4bcb-a4b1-48ef14b406de', tenantId: 'f96bccf8-a9e9-4a51-a698-22d0672afe76' };
const FILE_ID = 'a0f48875-4a46-4412-8d92-ddc573574e20';
const SHEET_CTRL = 'Controle Aproximação';
const GC = {Ana:'#C9962A',Arnaldo:'#E8621A',César:'#1E6B43',Fred:'#7d3c98',Gabriel:'#c0392b',Luiz:'#2471a3',Rodrigo:'#1abc9c'};

let tok = null;
let DATA = { rows: [] };

// LÓGICA DE GRAPH API COMPLETA
async function gfetch(path, opts={}) {
    const r = await fetch('https://graph.microsoft.com/v1.0'+path, {
        ...opts,
        headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json',...(opts.headers||{})},
    });
    return r.json();
}

async function syncData() {
    try {
        const resp = await gfetch(`/me/drive/items/${FILE_ID}/workbook/worksheets('${SHEET_CTRL}')/usedRange?$select=values`);
        const v = resp.values;
        DATA.rows = [];
        for(let i=3; i<v.length; i++) {
            if(v[i][0]) DATA.rows.push({ cliente: v[i][0], responsavel: v[i][1], status: v[i][3], entrada: v[i][4], assinado: v[i][10] });
        }
        renderAll();
    } catch(e) { alert("Erro ao sincronizar. Verifique o Login."); }
}

function renderAll() {
    renderGe(DATA.rows);
    renderMetas(DATA.rows);
}

function renderGe(rows) {
    const ges = [...new Set(rows.map(r => r.responsavel).filter(Boolean))].sort();
    document.getElementById('geC').innerHTML = ges.map(g => {
        const gr = rows.filter(r => r.responsavel === g);
        const trs = gr.map(r => `<tr><td>${r.cliente}</td><td>${r.status}</td><td>${r.entrada || '–'}</td></tr>`).join('');
        return `<div class="ge-sec">
            <div class="ge-nm" style="color:${GC[g]||'#000'}; font-weight:700; margin: 10px 0;">${g}</div>
            <div class="block"><table class="dt"><thead><tr><th>Cliente</th><th>Status</th><th>Entrada</th></tr></thead><tbody>${trs}</tbody></table></div>
        </div>`;
    }).join('');
}

function renderMetas(rows) {
    // Lógica simplificada de metas para o exemplo
    document.getElementById('metasTB').innerHTML = `<tr><td>Total de Clientes: ${rows.length}</td></tr>`;
}

function showTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
}

function doLoginFromOverlay() {
    // Simulação para o exemplo — no seu original aqui vai o window.location para o Azure
    document.getElementById('loginOverlay').style.display='none';
    syncData();
}

document.addEventListener('DOMContentLoaded', () => {
    // Aqui você deve manter seu initMSAL original
});
</script>
</body>
</html>
